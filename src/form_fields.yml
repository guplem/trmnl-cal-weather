- keyname: author_bio
  name: Calendar + Weather
  field_type: author_bio
  email_address: guplem@gmail.com
  category: calendar,environment
  github_url: https://github.com/guplem/trmnl-cal-weather
  learn_more_url: https://github.com/guplem/trmnl-cal-weather#readme

- keyname: trmnl_api_key
  name: TRMNL API Key
  field_type: password
  description: "Your personal API key from <a href='https://trmnl.com/account' target='_blank'>trmnl.com/account</a>. Needed to read your calendar data."
  help_text: "This is kept private and only used to poll your own calendar plugin"
  placeholder: "user_..."
  group: Calendar

- keyname: calendar_plugin_id
  name: Google Calendar Plugin ID
  field_type: string
  description: "Your Google Calendar plugin_setting_id. Find it in the URL when editing your <a href='https://github.com/guplem/trmnl-cal-weather?tab=readme-ov-file#step-1-connect-google-calendar' target='_blank'>Google Calendar plugin</a>: <code>usetrmnl.com/plugin_settings/<b>12345</b>/edit</code>. The plugin must stay in an <a href='https://github.com/guplem/trmnl-cal-weather?tab=readme-ov-file#step-6-keep-the-google-calendar-plugin-in-a-playlist' target='_blank'>active playlist</a> (hidden or with 1-min duration) to keep data refreshed."
  help_text: "The numeric ID, not the full URL"
  placeholder: "12345"
  group: Calendar

- keyname: latitude
  name: Latitude
  field_type: string
  description: "Your location's latitude. Find it at <a href='https://open-meteo.com/en/docs' target='_blank'>open-meteo.com</a>"
  placeholder: "41.39"
  group: Location

- keyname: longitude
  name: Longitude
  field_type: string
  description: "Your location's longitude"
  placeholder: "2.17"
  group: Location

- keyname: timezone
  name: Timezone
  field_type: time_zone
  description: "Your local timezone (must match your TRMNL timezone)"
  group: Location

- keyname: show_render_time
  name: Show render time
  field_type: boolean
  description: "Display the render time in the bottom bar"
  default_value: "false"
  group: Display
