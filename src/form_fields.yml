- keyname: author_bio
  name: Calendar + Weather
  field_type: author_bio
  email_address: guplem@gmail.com
  category: calendar,environment
  github_url: https://github.com/guplem/trmnl-cal-weather
  learn_more_url: https://github.com/guplem/trmnl-cal-weather#readme

- keyname: compatibility_notice
  name: Device compatibility
  field_type: description
  description: "Designed for the <b>TRMNL (OG)</b> in <b>full</b> view (800x480). Requires <a class='underline' href='https://help.trmnl.com/en/articles/12985974-understanding-color-palettes' target='_blank'>2-bit palette to be enabled</a> (available with <a class='underline' href='https://github.com/usetrmnl/trmnl-firmware/releases/tag/v1.6.0#:~:text=Adds%202%2Dbit%20grayscale' target='_blank'>firmware &gt;=1.6.0</a>). <i>TRMNL (X) is not supported.</i>"

- keyname: middleware_notice
  name: Middleware
  field_type: description
  description: "All data (calendar, weather, air quality) is served by a free <b>Google Apps Script</b> you deploy once on your own Google account (~10 minutes). Follow the <a class='underline' href='https://github.com/guplem/trmnl-cal-weather/blob/master/MIDDLEWARE_SETUP.md' target='_blank'>middleware setup guide</a> to get the two values below."

- keyname: middleware_url
  name: Middleware URL
  field_type: string
  description: "The Apps Script web app URL from the <a class='underline' href='https://github.com/guplem/trmnl-cal-weather/blob/master/MIDDLEWARE_SETUP.md' target='_blank'>middleware setup</a>. Just the base URL ending in <code>/exec</code>, without query parameters."
  help_text: "Ends in /exec"
  placeholder: "https://script.google.com/macros/s/.../exec"
  group: Middleware

- keyname: middleware_token
  name: Middleware token
  field_type: password
  description: "The secret you set in <code>CONFIG.token</code> when deploying the middleware."
  help_text: "This is kept private and must match the token configured in your Apps Script"
  placeholder: "long random string"
  group: Middleware

- keyname: ignored_phrases
  name: Ignored phrases
  field_type: string
  optional: true
  description: "Comma-separated patterns, each a case-insensitive regular expression tested against the event title and description. Plain text means 'contains'; use <code>^Work$</code> for an exact match or <code>\\bWork\\b</code> for a whole word."
  help_text: "Patterns cannot contain commas"
  placeholder: "^Work$, ^Focus Time$"
  group: Calendar

- keyname: latitude
  name: Latitude
  field_type: string
  description: "Your location's latitude. Find it at <a href='https://open-meteo.com/en/docs' target='_blank'>open-meteo.com</a>"
  placeholder: "41.39"
  group: Location

- keyname: longitude
  name: Longitude
  field_type: string
  description: "Your location's longitude"
  placeholder: "2.17"
  group: Location

- keyname: timezone
  name: Timezone
  field_type: time_zone
  description: "Your local timezone (must match your TRMNL timezone)"
  group: Location

- keyname: show_render_time
  name: Show render time
  field_type: boolean
  description: "Display the render time in the bottom bar"
  default_value: "false"
  group: Display

- keyname: show_diagnostics
  name: Show diagnostic overlay
  field_type: boolean
  description: "Show an on-screen pop-up when data issues are detected (e.g. weather or calendar fetch failures). Recommended ON during setup. Once the device is working reliably, turn this OFF: transient errors (like a single failed weather call) resolve on the next refresh, and the overlay covers a large portion of the calendar."
  default_value: "true"
  group: Display
